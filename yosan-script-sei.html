  //ROWに合わせて内容を変更する（請求処理パネル）
  function keiyakuHen(row){
    const payTableE = document.getElementById('payTable');
    document.getElementById('keiyaku').textContent = payTableE.rows[row].cells[1].textContent;
    //alert(row);
    const ukekin = payTableE.rows[row].cells[2].textContent;//請負金額
    const zenmade = payTableE.rows[row].cells[4].textContent;//前回まで請求
    const ukeN = Number(ukekin.replace(/,/g, "")) * 1.1;//税込みにする
    const ukeKomi = ukeN.toLocaleString();
    document.getElementById('ukeoiS').value = ukeKomi;

    const tuki = new Date().getMonth();//月セレクトは0からになってるのでそのまま
    //alert(tuki);
    document.getElementById('tukiS').selectedIndex = tuki;
    //セレクトした月に請求金額がある場合はその金額を前回迄請求から引いておく必要がある
    const tukiA = tuki + 1;
    const sctSei = sctSeiF(tukiA,row);//【関数】セレクトした月の請求金額を返す（数字）
    //alert(sctSei);
    //％の計算
    const zenmadeN = (Number(zenmade.replace(/,/g, "")) * 1.1) - sctSei;//セレクトした月の請求金額を引く(税込みにする)
    const made3 = zenmadeN.toLocaleString();
    document.getElementById('madeS').value = made3;
    const zanN = ukeN - zenmadeN;
    document.getElementById('zanS').value = zanN.toLocaleString();
    //初期値出来高は前回までの金額する
    document.getElementById('dekiS').value = made3;

    const pa = Math.round(zenmadeN / ukeN * 100 * 10) / 10;
    document.getElementById('dekipaS').value = pa;
    document.getElementById('motoPa').value = pa;
    document.getElementById('dekiPInfo').innerText = "出来高%(元%:" + pa + ")";//元％を記録しておく
    const memo = document.getElementById('info19').value;
    document.getElementById('memoS').value = memo;//メモ
    const ds = document.getElementById('info2').value;//DSにより請求の種類（出来高、請求済）セレクトチェンジ
    document.getElementById('kindsS').selectedIndex = 0;
    document.getElementById("climePane").hidden = false;//請求登録パネル開く
    document.getElementById('reziSeiBt').scrollIntoView({behavior: 'smooth'});

    //セレクト契約番号を記録
    const honRow = Number(document.getElementById('honRow').value);
    const sct = row - honRow + 1;//本契約が１ rowはsctRow
    document.getElementById('sct').value = sct;
  }
  
  //関数】セレクトした月の請求金額を返す（数字）
  function sctSeiF(tuki,row){//税込みで返す必要がある
    //alert(tuki)
    const ds = document.getElementById('info2').value;
    const payTableE = document.getElementById('payTable');
    if(ds == "D" || ds == "S2"){
      c = tuki + 5;
      //alert(c);
      tS = payTableE.rows[row].cells[c].textContent;
      //alert(tS);
      num = Number(tS.replace(/,/g, ""));
      //alert(num);
      return num * 1.1;
    }else if(ds == "S"){
      if(tuki > 9){
        c = tuki - 4;
        tS = payTableE.rows[row].cells[c].textContent;
        num = Number(tS.replace(/,/g, ""));
        return num * 1.1;
      }else{
        c = tuki + 8;
        tS = payTableE.rows[row].cells[c].textContent;
        num = Number(tS.replace(/,/g, ""));
        return num * 1.1;
      }
    }
  }
  //セレクト月をオンチェンジ
  function madeCal(){
    //セレクトした月の請求金額を計算に入れないので前月迄と残金が変わる
    const tukiS = document.getElementById('tukiS').value
    const tuki = Number(tukiS);
    const row = document.getElementById('setRow').value;
    const sctSei = sctSeiF(tuki,row);//【関数】セレクトした月の請求金額を返す（数字）
    const ukeoiSE = document.getElementById('ukeoiS');
    const madeSE = document.getElementById('madeS');
    const zanSE = document.getElementById('zanS');
    const ukeoiS = ukeoiSE.value;

    const payTableE = document.getElementById('payTable');
    const madeS = payTableE.rows[row].cells[4].textContent;//前回まで請求
  
    const ukeoiN = Number(ukeoiS.replace(/,/g, ""));//税込みにする
    const madeN = Number(madeS.replace(/,/g, "")) * 1.1;//税込みにする
    
    //前月迄計算
    const made = madeN - sctSei;
    const made3 = made.toLocaleString();
    madeSE.value = made3;
    const pa = Math.round(made / ukeoiN * 100 * 10) / 10;
    document.getElementById('dekipaS').value = pa;
    document.getElementById('motoPa').value = pa;
    document.getElementById('dekiPInfo').innerText = "出来高%(元%:" + pa + ")";//元％を記録しておく

    //出来高のとこも変更
    document.getElementById('dekiS').value = made3;//出来高も残金に変更する
    //残金計算
    const zan = ukeoiN - made;
    const zan3 = zan.toLocaleString();
    zanSE.value = zan3;
    //alert(made3 + "," + zan3);
    //月を変えたのでリセット
    document.getElementById('seiS').value = "";
  }

  //🔸🔸請求金額の変更onChange()
  function seiSChange(){
    const ukeoiSE = document.getElementById('ukeoiS');
    const ukeoiS = Number(ukeoiSE.value.replace(/,/g, ""));
    const seiSE = document.getElementById('seiS');
    const seiS = Number(calInpt(seiSE.value));//数式があれば計算する

    const dekiSE = document.getElementById('dekiS');
    const dekiS = Number(dekiSE.value.replace(/,/g, ""));
    const zanSE = document.getElementById('zanS');
    const madeSE = document.getElementById('madeS');;
    const madeS = Number(madeSE.value.replace(/,/g, ""));

    if ([ukeoiS, seiS].some(v => isNaN(v))) {
      alert("入力が正しくありません（数値のみ）");
      return;
    }

    const dekiA = madeS + seiS;
    //const madeA = ukeoiS - dekiA;前回までは変更しない
    const pa = ukeoiS > 0 ? Math.round((dekiA / ukeoiS) * 1000) / 10 : 0;
    const zan = ukeoiS - dekiA;

    document.getElementById('seiS').value = seiS.toLocaleString();
    document.getElementById('dekiS').value = dekiA.toLocaleString();
    document.getElementById('zanS').value = zan.toLocaleString();
    //document.getElementById('madeS').value = madeA.toLocaleString();//前回までは変更しない
    document.getElementById('dekipaS').value = pa;

    seiSE.readOnly = true;
    seiSE.style.border = "";
  }

  //計算式を入力した場合の関数
  function calInpt(num) {
    try {
      if (!num) return 0; // 空の場合は0
      // カンマを除去
      const cleaned = num.replace(/,/g, "");
      // 自動で * を補完（例: "2(3+1)" → "2*(3+1)", "(3)(2)" → "(3)*(2)"）
      const safeExpr = cleaned
        .replace(/(\d+)(\()/g, "$1*(")
        .replace(/(\))(\d|\()/g, "$1*$2");

      // 計算を実行（Functionを安全に使う）
      const result = Function('"use strict"; return (' + safeExpr + ')')();

      // 数値でない結果の対処
      if (isNaN(result)) return 0;

      // 四捨五入して整数で返す
      return Math.round(result);
    } catch (e) {
      console.error("計算エラー:", e);
      return 0;
    }
  }


  //◆出来高入力オンのチェンジ
  function dekiCal(){
    const ukeoiSE = document.getElementById('ukeoiS');
    const dekiSE = document.getElementById('dekiS');
    const dekipaSE = document.getElementById('dekipaS');
    const madeSE = document.getElementById('madeS');
    const seiSE = document.getElementById('seiS');
    const zanSE = document.getElementById('zanS');
    const ukeoiS = ukeoiSE.value;
    const deki = String(dekiSE.value);//入力
    const dekipaS = dekipaSE.value;
    const madeS = madeSE.value;
    const seiS = seiSE.value;
    const zanS = zanSE.value;
    if(deki == ""){
      alert("出来高金額を入力ください");
      dekiSE.value = madeS;
    }else{
      const ukeN = Number(ukeoiS.replace(/,/g, ""));
      const madeN = Number(madeS.replace(/,/g, ""));
      let zanN = Number(zanS.replace(/,/g, ""));
      //alert(deki);
      const dekiN = calInpt(deki);//数式を計算する

      const dekiJudgeF = () => {
        if(dekiN > ukeN){//出来高が請負を超えてる場合
          const q = window.confirm('出来高が請負金額を超えてますが続けますか');
          if(q == true){//請負が0の場合がある（小規模）
            return "OK";
          }else{
            alert("入力しなおしてください");
            return "NG";
          }
          dekiSE.value = "";
        }else if(madeN > dekiN){//出来高が前回まで以下の場合
          const q2 = window.confirm('出来高が前回迄金額以下です\n続けますか');
          if(q2 == true){
            return "OK";
          }else{
            return "NG";
          }
        }else{
          return "OK";
        }  
      }
      const dekiJudge = dekiJudgeF();
      //alert(dekiJudge);

      if(dekiJudge =="NG"){
        document.getElementById('dekiS').value = madeS;
      }else{
        document.getElementById('dekiS').value = Number(dekiN).toLocaleString();
        //請求
        const seiN = dekiN - madeN;
        seiSE.value = seiN.toLocaleString();
        //残金
        zanN = ukeN - dekiN;
        zanSE.value = zanN.toLocaleString();
        //パーセントの計算
        const pa = Math.round(dekiN / ukeN * 100 * 10) / 10;
        dekipaSE.value = pa;
      }
    }
    
  }
  //◆出来高（％）入力オンチェンジ
  function paCal(){
    const ukeoiSE = document.getElementById('ukeoiS');
    const dekiSE = document.getElementById('dekiS');
    const dekipaSE = document.getElementById('dekipaS');
    const madeSE = document.getElementById('madeS');
    const seiSE = document.getElementById('seiS');
    const zanSE = document.getElementById('zanS');
    const ukeoiS = ukeoiSE.value;
    const deki = dekiSE.value;//入力
    const dekipaS = dekipaSE.value;
    const madeS = madeSE.value;
    const seiS = seiSE.value;
    const zanS = zanSE.value;
    const motoPa = document.getElementById('motoPa').value;//元％

    const ukeN = Number(ukeoiS.replace(/,/g, ""));
    const madeN = Number(madeS.replace(/,/g, ""));
    let zanN = Number(zanS.replace(/,/g, ""));

    let pa = Number(dekipaSE.value);
    if(pa == ""){
      alert("出来高％に数値を入力ください");
    }else if(pa > 100 || pa < motoPa){
      alert("出来高％に正しい数値を入力ください\n元%～100％");
    }else{
      //パーセントは小数第1位までに変形
      pa = Math.round(pa * 10) / 10;
      dekipaSE.value = pa;
      const dekiN = Math.round(ukeN * pa / 100 / 100) * 100;
      dekiSE.value = dekiN.toLocaleString();

      //請求
      const seiN = dekiN - madeN;
      seiSE.value = seiN.toLocaleString();
      //残金
      zanN = ukeN - dekiN;
      zanSE.value = zanN.toLocaleString();

    }
  }

  //😃😃長谷工の請求書アップロードパネルの表示ｊｓ
  // 1. グローバル変数（選択されたファイルを一時保存）
  let selectedFile = null;

  // 2. ドラッグオーバー時（枠の上にファイルが来た時）
  function dragOver(e) {
    e.preventDefault(); // これをしないとファイルが開いてしまう
    e.currentTarget.classList.add('dragover'); // 背景色を変えるなどの演出
  }

  // 3. マウスが枠から外れた時（またはドラッグが外れた時）
  function dragLeave(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover'); // 背景色を元に戻す
  }

  // 4. ファイルをドロップした時
  function dropFile(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      fileSelected(files); // ファイル選択処理へ
    }
  }

  // 5. ファイルが選択された時のプレビュー表示
  function fileSelected(files) {
    if (files.length === 0) return;
    
    selectedFile = files[0]; // 1つ目のファイルを取得
    document.getElementById('statusArea').innerText = "選択中: " + selectedFile.name;
    document.getElementById('upBtn').disabled = false; // ボタンを活性化

    // 画像の場合はプレビューを表示する
    const preview = document.getElementById('previewArea');
    if (selectedFile.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = function(e) {
        preview.innerHTML = '<img src="' + e.target.result + '" style="max-width:100%; border:1px solid #ccc;">';
      };
      reader.readAsDataURL(selectedFile);
    } else {
      preview.innerHTML = '<div style="font-size:30px;">📄</div>' + selectedFile.name;
    }
  }

  // 😃😃6. アップロード実行ボタンが押された時
  function startUpload() {
    if (!selectedFile) return;

    const btn = document.getElementById('upBtn');

    // ★ PDF制限を追加
    if (selectedFile.type !== 'application/pdf') {
      alert("エラー：PDFファイルのみアップロード可能です。\n現在のファイル形式: " + selectedFile.type);
      return; // ここで処理を中断
    }

    btn.value = "アップロード中...";
    btn.disabled = true;

    const reader = new FileReader();
    reader.onload = function(e) {
      const base64Data = e.target.result.split(',')[1];
      const contentType = selectedFile.type;
      const fileName = selectedFile.name;
      
      // 各項目の取得
      const genS = document.getElementById('genS').value;
      const kinds = document.getElementById('info4').value;
      const kin = document.getElementById('seiS').value;
      const tukiS = document.getElementById('tukiS').value;

      // GAS側の関数「uploadHaseSeiFile」を呼び出す
      google.script.run
        .withSuccessHandler(function(url) {
          alert("アップロードが完了しました！");
          btn.value = "アップロード完了";
          document.getElementById('statusArea').innerText = "✅ 送信済み";
        })
        .withFailureHandler(function(err) {
          alert("エラー: " + err);
          btn.disabled = false;
          btn.value = "アップロード実行";
        })
        .uploadHaseSeiFile(base64Data, contentType, fileName, genS, kinds, kin, tukiS);
    };
    reader.readAsDataURL(selectedFile);
  }
</script>
