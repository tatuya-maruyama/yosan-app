  // 😃😃スクショをペースト処理
  window.addEventListener('paste', function (e) {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;

  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    if (item.kind === 'file' && item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      if (blob) {
        blob.name = blob.name || '貼り付け画像.png'; // ← 名前を補完

        document.getElementById('pdfImage').value = 'image';

        const tempReader = new FileReader();
        tempReader.onload = function (event) {
          const dataUrl = event.target.result;

          // 表示だけ行う
          document.getElementById('upImage').src = dataUrl;
          document.getElementById('upImage').style.display = "block";
          document.querySelector('.overlay4').style.display = "none";

          document.getElementById('upLoadPane').hidden = true;
          document.getElementById('upInfoPane').hidden = false;
          document.querySelector('.overlay4').style.display = "block";
          document.getElementById('upInfo').innerHTML = `アップロード中⇒⇒<br>ファイル名：${blob.name}`;
          
          // selectFilesに配列として渡す
          selectFiles([blob]);
        };
        tempReader.readAsDataURL(blob); // 表示用に一度読ませる
      }
    }
  }
});


  // PDFファイルを画像に変換してData URLを返す関数
  async function loadPDF(pdfFile) {
    const arrayBuffer = await pdfFile.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const page = await pdf.getPage(1);
    const scale = 3;
    const viewport = page.getViewport({ scale: scale });

    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    context.imageSmoothingEnabled = false; // 滲み防止

    await page.render({
      canvasContext: context,
      viewport: viewport
    }).promise;

    // JPEG形式でBase64画像を返す
    return canvas.toDataURL("image/jpeg", 1.0);
  }

  //😃😃CSVの処理はこちらから
  window.postCsvFile = function(file, which, upKeiyaku){
    if (!file || file.type !== "text/csv") {
      alert("CSVファイルを1つ選択してください");
      return;
    }
    const reader = new FileReader();

    reader.onloadend = function (e) {
      const dataURL = e.target.result;
      const base64 = dataURL.split(',')[1];

      const ds = document.getElementById('info2').value || document.getElementById('dsSct').value;
      const reziYobi = (which === "csvRezi") ? "rezi" : "yobi";
      document.getElementById('reziYobi').value = reziYobi;

      // 表示切替（読み込み中）
      document.querySelector('.overlay4').style.display = "none";
      document.getElementById('upInfoPane').hidden = true;
      document.getElementById('infoA').hidden = false;
      document.querySelector('.overlay4').style.display = "block";

      // CSVファイルをGASへ送信・解析
      google.script.run.withSuccessHandler(function (dt) {
        const rn = dt.split(',');

        if (rn[0] === "複数") {
          const sctCsvTE = document.getElementById('sctCsvT');
          const num = Number(rn[1]);
          const last = num + 1;
          const end = last + 1;
          const tbody = document.createElement('tbody');

          for (let i = 2; i < last + 2; i++) {
            if (i === end) {
              sctCsvTE.appendChild(tbody);
              document.querySelector('.overlay4').style.display = "none";
              document.getElementById('infoA').hidden = true;
              document.getElementById('csvSctList').hidden = false;
              document.querySelector('.overlay4').style.display = "block";
            } else {
              const tr = document.createElement('tr');
              const th = document.createElement('th');
              const td = document.createElement('td');
              th.textContent = i - 1;
              td.textContent = rn[i];
              tr.appendChild(th);
              tr.appendChild(td);
              tbody.appendChild(tr);
            }
          }

        } else {
          csvReziOK(rn, reziYobi); // 1件のみの場合
        }

        document.getElementById('upFile').value = ""; // ファイル選択をリセット

      }).getCSVdata(ds, upKeiyaku); // GAS側へ送信
    };

    reader.readAsDataURL(file); // CSVファイル読み込み開始
  }

  //csv複数ある場合のモーダルからの選択クリック
  function sctCsv(){
    const csvClickE = document.getElementById('csvClick');
    const csvClick = csvClickE.value;//選択したテーブルRow
    const sctCsvTE = document.getElementById('sctCsvT');
    const sct = sctCsvTE.rows[csvClick].cells[1].textContent;
    const val2 = sct.slice(sct.indexOf('◆') + 1);//登録用No
    //alert(sct);
    const reziYobi = document.getElementById('reziYobi').value;
    //alert(reziYobi);
    const hatyuNoE = document.getElementById('info23');
    let hatyuNo = hatyuNoE.value;
    //alert(hatyuNo);
    const rn = hatyuNo.split(',');
    const last = rn.length;
    for(let i=0; i<last+1; i++){
      if(i == last){
        const msg = confirm(sct + '　のCSVを登録します');
        if(msg == true){
          const reziNo = sct.slice(sct.indexOf("◇") + 1);
          const genE = document.getElementById('info3');
          const gen = genE.value;

          if(reziYobi == "rezi"){
            google.script.run.withSuccessHandler(function(dt){
              const rn = dt.split(',');
              const reziYobi = document.getElementById('reziYobi').value;
              csvReziOK(rn,reziYobi);
            }).reziCsvGet(gen,reziNo);//◆注意◆コードgenToroku.gsにある
          }else if(reziYobi == "yobi"){
            if(hatyuNo == ""){
              hatyuNoE.value = sct;
            }else{
              val1 = document.getElementById('info23').value;
              // alert(val1);
              // alert(val2);
              val = val1 + "/" + val2;
              //alert(val);
              hatyuNoE.value = val;
            }
          }
        }
      }else if(rn[i] == val2){
        alert("選択したCSVはすでに登録してるようです");
        break;
      }
    }
  }

        document.getElementById('csvList').hidden = false;
        document.querySelector('.overlay4').style.display = "block";
      }else{
        let tr = document.createElement('tr');

        let td = document.createElement('td');

        tr.appendChild(th);
        tr.appendChild(td);
        tbody.appendChild(tr);
      }
    }
  }
