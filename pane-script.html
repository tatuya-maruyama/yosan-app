<script>
  //◆◆大規模用◆◆予算書からアクセス
  window.onload = function(){

      document.querySelector('.overlay4').style.display = "block";

      const param1 = location.parameter.param1;
      document.getElementById('fId').value = param1;
      document.getElementById('controlPane').hidden = false;
      const param2 = location.parameter.param2;//Sまたはなしparam2がある場合は小規模
      //alert(param1,param2);
      document.getElementById('ds').value = param2;
      if(param2 == "S"){
        //小規模を開く注文書発行管理
        document.getElementById('btPane1').hidden = true;//大規模のパネル
        document.getElementById('btPane2').hidden = false;//小規模パネル
        document.getElementById('koteiT').hidden = true;//工程表パネル非表示
        //document.getElementById('backBt').hidden = true;//戻るボタンを非表示
      }
      google.script.run.withSuccessHandler(function(dt){
        const rn = dt.split(',');
        const gen = rn[0];
        const tan = rn[1];
        document.getElementById('genmei').value = gen;
        document.getElementById('genmeiA').value = gen;
        document.getElementById('genmeiB').value = gen;
        document.getElementById('genmeiC').value = gen;
        document.getElementById('genTan').value = tan;
        document.querySelector('.overlay4').style.display = "none";
        document.getElementById('infoA').hidden = true;
      }).genInfo(param1,param2);
      const param3 = location.parameter.param3;
      document.getElementById('pass').value = param3;
     if ('param4' in location.parameter) {
        const param4 = location.parameter.param4
        document.getElementById('syaId').value = param4;
        //戻るを表示する
        document.getElementById('bkYosanBt').hidden = false;
        //alert(param3 + "," + param4);
        kengenCheck(param3,param4);
      }else{
        kengenCheck(param3);
      }
      if ('param5' in location.parameter) {
        document.getElementById('access').value = location.parameter.param5;
      }
    })
  }
  //😃権限確認
  function kengenCheck(param3, param4) {
    const kengenNG = () => {
      document.getElementById('kengen').value = "NG";
      document.getElementById('readBt').hidden = true;//内訳書反映ボタン
      document.getElementById('resetBt').hidden = true;//内訳内容リセット
      document.getElementById('utiOKBt').hidden = true;//案内、注文書発行ボタン
      document.getElementById('flUp1').hidden = true;//添付ファイル登録ボタン
      document.getElementById('flUp2').hidden = true;//添付ファイル登録ボタン２
      document.getElementById('plusMailBt').hidden = true;//ccメール登録ボタン
      document.getElementById('ccResetBt').hidden = true;//ccメールリセットボタン
      document.getElementById('genkaSetBt').hidden = true;//原価設定ボタン
      document.getElementById('tanHatuBt').hidden = true;//発注書発行（単独）
    };
    if (!param4) {
      //alert("権限チェックNG（param4が未定義）");
      kengenNG();
      return;
    }

    google.script.run.withSuccessHandler(function (judge) {
      //alert(judge); // "OK" か "NG"
      document.getElementById('kengen').value = judge;
      if (judge == "NG") {
        kengenNG();
      }
    }).kenkakuA(param4, param3);
  }

  //戻るボタンクリック
  async function bkYosan(){//yosan.html(予算書インフォ)に戻る
    document.getElementById('infoA').hidden = false;
    document.querySelector('.overlay4').style.display = "block";
    const fId = document.getElementById('fId').value;
    const access = document.getElementById('access').value;
    const syaId = document.getElementById('syaId').value;
    const pass = document.getElementById('pass').value;
    const ds = document.getElementById('ds').value;
    const urlA = await new Promise((res) => {
      google.script.run.withSuccessHandler(res).getSetUrl("予算書アプリ");
    });

    const url = urlA + "?page=yosan" + "&param1=" + fId  + "&param2=" + access + "&param3=" + syaId + "&param4=" + pass + "&param5=" + ds;  
    window.top.location.href = url;
  }
  //◆◆CSV読み込み＆リセットボタンクリック
  function csv(id){
    //alert("csvBt");
    const fIdE = document.getElementById('fId');
    const fId = fIdE.value;
    const passE = document.getElementById('pass');//権限用
    const pass = passE.value;
    
    if(id == 'readBt'){
      //アップロード方式にする
      const msg = window.confirm("すでに予算書に内訳を読み込んでいる場合はリセットされますがよろしいですか");
      if(msg == true){
        const e = "内訳";
        upLoad(e)//アップロードモーダル起動
      }
    }else if(id == 'resetBt'){
      const msg = window.confirm('内訳鏡をリセットします');
      if(msg == true){
        document.getElementById('infoA').hidden = false;
        document.querySelector('.overlay4').style.display = "block";
        google.script.run
        .withFailureHandler(function(er){
          alert('◆ERROR　失敗しました\n' + re.message);
          document.getElementById('infoA').hidden = true;
          document.querySelector('.overlay4').style.display = "none";
        }).withSuccessHandler(function(dt){
          if(dt == "NG"){
            alert("こちらの機能は使用できません");
          }else{
            alert('内訳鏡の内容をリセットしました');
          }
          document.getElementById('infoA').hidden = true;
          document.querySelector('.overlay4').style.display = "none";
        }).csvReset(fId,pass);
      }
    }
  }

  //◆業者変更ボタンクリック
  function gyoHen(id){//単独の場合を追加する

    const pass = passE.value;
    const kengen = document.getElementById('kengen').value;
    let kosyu = "";
    let row = "";
    if(kengen == "OK"){
      const msgF = () => {
        const idA = id.slice(0,2);
        //alert("idA:" + idA);
        if(id == "tanHenInpt"){
          //これは”注文書（単独）からですよの記録
          document.getElementById('tanHatuPane').hidden = true;
          document.getElementById('tanHatuRec').value = "単独";//ここに"単独”記録されてる場合は単独発注
          kosyu = "単独発注";
          return true;
        }else if(idA == "gi"){const index = Number(id.slice(4));
          //alert("index:" + index);
          const gyoSctTE = document.getElementById('gyoSctT');
          row = gyoSctTE.rows[index].cells[0].textContent;
          kosyu = gyoSctTE.rows[index].cells[1].textContent;//確認用に
          document.getElementById('kosyuSet').value = index;//選択した工種のindexを記録
          const ms = window.confirm(kosyu + "の業者変更をします");
          document.getElementById('tanHatuRec').value = "";//記録されてる場合は書き換え
          return ms;
        }else{
          document.getElementById('tanHatuRec').value = "";//記録されてる場合は書き換え
          return true;
        }
      }
      const msg = msgF();
      //alert(msg);
      if(msg == true){
        google.script.run
        .withFailureHandler(function(er){
          alert("エラーが起きました\n" + er.message);
        }).withSuccessHandler(function(dt){
          document.getElementById('listSctGBt').hidden = true;//OKボタンを非表示
          const sctGyoE = document.getElementById('sctGyo');
          sctGyoE.innerHTML = ""
          const rn = dt.split(',');
          const last = Number(rn[0]);
          const end = last + 1;
          for(let i=0; i<=end; i++){
            if(i == end){
              document.getElementById('gSctInfo').innerText = "【" + kosyu + "】業者セレクト"
              document.getElementById('listGyoT').innerHTML = "";//業者リストをリセット
              document.getElementById('infoA').hidden = true;
              document.querySelector('.overlay4').style.display = "none";
              
              document.getElementById('listGyoPane').hidden = false;
              document.querySelector('.overlay5').style.display = "block";
            }else if(i == 0){
              let option = document.createElement('option');
              option.value = "選択";
              option.text = "選択";
              sctGyoE.appendChild(option);
            }else{
              let option = document.createElement('option');
              option.value = rn[i];//ROWをセット
              option.text = rn[i];//名前をセット
              sctGyoE.appendChild(option);
            }
          }
        }).gyoKasira();
      }else{
        document.getElementById('infoA').hidden = true;
        document.querySelector('.overlay4').style.display = "none";
      }
    }else{
      alert("こちらの機能は使用できません");
      document.getElementById('infoA').hidden = true;
      document.querySelector('.overlay4').style.display = "none";
    }
  }

  //◆◆業者セレクトOKをクリック（決定）
  function listGsctOK(){
    //単独注文書作成を分岐
    const tanHatuRec = document.getElementById('tanHatuRec').value;
    const index = document.getElementById('gyoSet').value;
    const listGyoTE = document.getElementById('listGyoT');
    const gyoRow = listGyoTE.rows[index].cells[0].textContent;
    const gyo = listGyoTE.rows[index].cells[1].textContent;

    if(tanHatuRec == "単独"){
      document.getElementById("tanHGyo").innerText = gyo;
      document.querySelector('.overlay5').style.display = "none";
      document.getElementById('listGyoPane').hidden = true;
      document.getElementById('tanHatuPane').hidden = false;
      document.querySelector('.overlay5').style.display = "block";
      document.getElementById('gyoRow').value = gyoRow;
    }else{
      //大規模なのか小規模なのかで分岐
      const ds = document.getElementById('ds').value;
      if(ds == "S"){
        //金額の入力モーダル
        syokiboHatyu();//pane-script2へ
      }else{
        document.getElementById('listGyoPane').hidden = true;
        document.querySelector('.overlay5').style.display = "none";
        document.getElementById('infoA').hidden = false;
        document.querySelector('.overlay4').style.display = "block";
        
        const index = document.getElementById('gyoSet').value;
        const listGyoTE = document.getElementById('listGyoT');
        const gyoRow = listGyoTE.rows[index].cells[0].textContent;
        const gyo = listGyoTE.rows[index].cells[1].textContent;
        
        const kosyuSetE = document.getElementById('kosyuSet');
        const kosyuIndex = kosyuSetE.value;
        //alert(kosyuIndex);
        const gyoSctTE = document.getElementById('gyoSctT');
        const kin = gyoSctTE.rows[kosyuIndex].cells[3].textContent;
        const kosyuRow = gyoSctTE.rows[kosyuIndex].cells[0].textContent;

        const fIdE = document.getElementById('fId');
        const fId = fIdE.value;

        google.script.run
        .withFailureHandler(function(er){
          alert("エラーが起きました\n" + er.message);
        }).withSuccessHandler(function(dt){
          //dtは反映OKまたはNG（メッセージ）建設業がない場合
          const rn = dt.split(',');
          const judge = rn[0];
          const mes = rn[1];//OKの場合は業者名の（株）を返す、NGの場合はメッセージ
          if(judge == "OK"){
            gyoSctTE.rows[kosyuIndex].cells[2].textContent = mes;//業者名（株）
            document.getElementById('listGyoPane').hidden = true;
            document.getElementById('infoA').hidden = true;
            document.querySelector('.overlay4').style.display = "none";
          }else{
            alert(mes);
            document.getElementById('infoA').hidden = true;
            document.querySelector('.overlay4').style.display = "none";
            document.getElementById('listGyoPane').hidden = false;
          }
        }).kosyuGyoRezi(gyoRow,gyo,kin,kosyuRow,fId);
      }
    }
  }
  //◆◆案内パネル表示◆◆クリック
  function anTyuKan(id){
    const index = Number(id.slice(4));
    const anTyuF = () => {
      const at = id.slice(0,3);
      if(at == "aid"){
        document.getElementById('anTyuInfo').innerText = "【案内】管理パネル";
        document.getElementById('anBt2').hidden = false;
        document.getElementById('tyuBt2').hidden = true;
        return "案内";
      }else if(at == "tid"){
        document.getElementById('anTyuInfo').innerText = "【発注】管理パネル";
        document.getElementById('anBt2').hidden = true;
        document.getElementById('tyuBt2').hidden = false;
        return "発注";
      }
    }
    const anTyu = anTyuF();
    //alert(index);
    document.getElementById('kosyuSet').value = index;//選択した工種のindexを記録
    const gyoSctTE = document.getElementById('gyoSctT');
    const kosyuRow = gyoSctTE.rows[index].cells[0].textContent;
    const kosyu = gyoSctTE.rows[index].cells[1].textContent;

  //🔹🔹３桁カンマに変換する（全角数字にも対応）
  function comma3(value) {
    if (typeof value !== 'string') value = String(value);

    // 全角数字→半角へ変換
    value = value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));

    // カンマ除去（すでに入ってる場合）
    value = value.replace(/,/g, '');

    // 数値チェック（数字以外が混じっていたらNaN扱いに）
    const num = Number(value);
    if (isNaN(num)) return ''; // 不正な場合は空文字で返す

    // 3桁カンマ付け
    return num.toLocaleString();
  }

    const tanHKindsE = document.getElementById('tanHKinds');
    const nin = tanHKindsE.value;
    const tanHKosyuE = document.getElementById('tanHKosyu');
    const kosyu = tanHKosyuE.value;
    const tanHGyoE = document.getElementById('tanHGyo');
    const gyo = tanHGyoE.innerText;
    const tanHKinE = document.getElementById('tanHKin');
    const kin = tanHKinE.value;
    const tanHMsgE = document.getElementById('tanHMsg');
    const message = tanHMsgE.value;
    const fIdE = document.getElementById('fId');
    const fId = fIdE.value;
    const gyoRowE = document.getElementById('gyoRow');
    const gyoRow = gyoRowE.value;
    if(tanHKinds == ""){
      alert("工種を入力ください");
      document.getElementById('infoA').hidden = true;
      document.querySelector('.overlay4').style.display = "none";
      return;
    }else if(tanHKin == ""){
      alert("発注金額を入力ください");
      document.getElementById('infoA').hidden = true;
      document.querySelector('.overlay4').style.display = "none";
      return;
    }
    const msg = window.confirm("注文書を作成します\n現場名：" + gen + "\n識別：" + nin + "\n工種：" + kosyu + "\n発注先：" + gyo + "\n発注金額：" + kin);
    const dayF = () => {
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth() + 1;
      const d = now.getDate();
      const niti = y + "年" + m + "月" + d + "日";
      const msg = window.confirm('発注日は今日の日付でOKですか');
      if(msg == true){
        return niti;
      }else{
        const msg2 = window.confirm('工期の着工日でよいですか');
        if(msg2 == true){
          return "着工日";
        }else{
          const msg3 = window.prompt('発注日を入力ください');
          return msg3;
        }
      }
    }
    if(msg){
      const day = dayF();
      const data = [gen,nin,kosyu,gyo,kin,message,fId,day,gyoRow]
      const json = JSON.stringify(data);
      google.script.run.withFailureHandler(function(er){
        alert("◆◇ERROR\n" + er.message);
      }).tanHRezist(json);
      alert("案内メールは自動で送信されます\n送信完了チャットを送ります");
      document.getElementById('infoA').hidden = true;
      document.querySelector('.overlay4').style.display = "none";
      //パネルを閉じる
      document.querySelector('.overlay5').style.display = "none";
      document.getElementById('tanHatuPane').hidden = true;
    }
  }
</script>
