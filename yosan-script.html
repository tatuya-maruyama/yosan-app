  //◆◆計算用式対応＆３桁カンマにする
  function calCam(id) {
    const el = document.getElementById(id);
    if (!el) return;

    let val = el.value.trim();

    // カンマ削除（1,000 → 1000）
    val = val.replace(/,/g, "");

    try {
      // 数式評価（例：1000 / 1.1）
      const result = math.evaluate(val);

      if (isNaN(result)) {
        el.value = "無効な数式";
        return;
      }

      // 3桁カンマ + 小数第2位まで
      el.value = Number(result).toLocaleString("ja-JP", {
        maximumFractionDigits: 2
      });

    } catch (e) {
      el.value = "計算エラー";
      console.error("式の解析エラー:", e);
    }
  }

  //◆◆内容変更ボタンクリック
  function genHen() {
  const msg = window.confirm("現場の内容の変更を実行します。よろしいですか？");

  const comma3 = (e) => {
    if (e.indexOf(',') == -1) {
      return e;
    } else {
      const f = e.replace(/,/g, "");
      return f;
    }
  };

  if (msg == true) {
    document.querySelector('.overlay4').style.display = 'block';
    document.getElementById('infoA').hidden = false;

    const fId = document.getElementById('fId').value;
    const ds = document.getElementById('ds').value;

    // JSONで送る
    const data = {
      fId: fId,
      ds: ds,
      gen: document.getElementById('info3').value,
      naiyo: document.getElementById('info4').value,
      uke: Number(comma3(document.getElementById('info5').value)),
      st: document.getElementById('info13').value,
      fn: document.getElementById('info14').value,
      add: document.getElementById('info15').value,
      tan: document.getElementById('info16').value,
      client: document.getElementById('info17').value,
      memo: document.getElementById('info19').value,  
      motoTan: document.getElementById('info20').value,
      mMail: document.getElementById('info21').value,
      csv: document.getElementById('info23').value,
      keiyaku: document.getElementById('info24').value,
      chatUrl: document.getElementById('info26').value 
    };

    const json = JSON.stringify(data);

    google.script.run
      .withFailureHandler(function (er) {
        alert("◆◇ERROR\n予算書アプリ⇒genInfoHen()\n" + er.message);
      })
      .withSuccessHandler(function (dt) {
        if (dt == "OK") {
          alert("登録内容を変更しました");
          document.querySelector('.overlay4').style.display = 'none';
          document.getElementById('infoA').hidden = true;
        } else {
          alert("エラーが発生しています。\n管理者に確認してください。\n" + dt);
        }
      })
      .genInfoHen(json);
  }
}

}

//🔸🔸注文書パネルの発行日、本日ボタン
function honzitu(){//もう１回押すと".    年　　月　　日”に戻す
  const dayA = document.getElementById('day').value;
  if(dayA == "　　　　年　　月　　日"){
    const now = new Date();
    const nen = now.getFullYear();
    const getu = now.getMonth() + 1;
    const niti = now.getDate();
    const day = nen + "年" + getu + "月" + niti + "日";
    document.getElementById('day').value = day;
  }else{
    document.getElementById('day').value = "　　　　年　　月　　日";
  }
}

  //🔸🔸契約書リストオープン
  function keiyakuListOpen(){
    document.getElementById('infoA').hidden = false;
    document.querySelector('.overlay4').style.display = "block";
    const fIdE = document.getElementById('fId');
    const fId = fIdE.value;
    google.script.run.withSuccessHandler(function(dt){
      const keiyakuListTE = document.getElementById('keiyakuListT');
      const data = JSON.parse(dt);
      const last = Number(data.list[0][0]);

      // 古いtbody削除
      const oldTbody = keiyakuListTE.querySelector('tbody');
      if (oldTbody) keiyakuListTE.removeChild(oldTbody);

      const tbody = document.createElement('tbody');

      for(let i = 0; i <= last; i++){
        const tr = document.createElement('tr');
        if(i == 0){
          const ar = ["No", "注文書", "金額", "fileId",""];
          for(let a=0; a<ar.length; a++){
            const th = document.createElement('th');
            th.textContent = ar[a];
            tr.appendChild(th);
            if(a == 3){
              th.hidden = true;
            }
          }
        }else{
          const th1 = document.createElement('th');
          const td2 = document.createElement('td');
          const td3 = document.createElement('td');
          const td4 = document.createElement('td');
          const td5 = document.createElement('td');
          th1.textContent = i;
          td2.textContent = data.list[i][0];
          td3.textContent = data.list[i][1].toLocaleString();
          td3.style.textAlign = "right";
          td4.textContent = data.list[i][2];
          td5.insertAdjacentHTML('afterbegin', '<input id="kei-' + i + '" type="button" value="OPEN" onclick="openFile(this.id)"/>');
          td4.hidden = true;
          tr.appendChild(th1);
          tr.appendChild(td2);
          tr.appendChild(td3);
          tr.appendChild(td4);
          tr.appendChild(td5);
        }
        tbody.appendChild(tr);
      }

      keiyakuListTE.appendChild(tbody);
      document.querySelector('.overlay4').style.display = "none";
      document.getElementById('infoA').hidden = true;
      document.getElementById('keiyakuListPane').hidden = false;
      document.querySelector('.overlay4').style.display = "block";
    }).getKeiyakuList(fId);
  }

  //🔸🔸契約書PDFを開く
  function openFile(id){
    const index = Number(id.slice(4));
    const keiyakuListTE = document.getElementById('keiyakuListT');
    const fileId = keiyakuListTE.rows[index].cells[3].textContent
    const kengen = document.getElementById('kengen').value;//権限があるかないか
    //alert("権限" + kengen);
    if(fileId == ""){
      alert("ファイルが登録されてません");
      //ファイル登録へ
      if(kengen == "OK"){
        const msg = window.confirm("ファイルを登録しますか");
        if(msg == true){
          const e = "pdfBt";
          document.getElementById('sct').value = index;
          csvUpPaneOP(e);
        }
      }
    }else{
      const msg = window.confirm("登録されたファイルを開きますか")
      if(msg == true){
        const url = "https://drive.google.com/file/d/" + fileId + "/view";
        window.open(url, '_blank');
      }else{
        if(kengen == "OK"){
           const msg = window.confirm("【登録変更】\n登録したファイルを変更しますか");
          if(msg == true){
            const e = "pdfBt";
            document.getElementById('sct').value = index;
            csvUpPaneOP(e);//長谷工csv,契約書PDF、新規契約書登録共通、引数で判断する
          }
        }
      }
    }
  }
